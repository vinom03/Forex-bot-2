# ============================================================
# ملف جدولة GitHub Actions - بوت نسخ منشورات تيليجرام
# ============================================================
# مكان الرفع الإلزامي: .github/workflows/bot.yml (بالضبط بهذا المسار
# داخل المستودع، وإلا GitHub ما يتعرف عليه كجدولة).
#
# الوظيفة: يشغّل ملف telegram_forwarder_fixed.py تلقائياً كل 5 دقائق
# (أقصر فترة يسمح بها GitHub)، ويحفظ أي تحديث بملفات last_seen_id.txt
# و bot_log.txt داخل المستودع نفسه بعد كل تشغيلة.
#
# قبل الاستخدام:
#   1. أضف توكن البوت كـ GitHub Secret باسم BOT_TOKEN
#      (Settings -> Secrets and variables -> Actions -> New repository secret)
#   2. فعّل صلاحية الكتابة: Settings -> Actions -> General ->
#      Workflow permissions -> Read and write permissions -> Save
# ============================================================

name: Telegram Forwarder Bot

on:
  schedule:
    - cron: '*/5 * * * *'   # يشتغل تلقائياً كل 5 دقائق
  workflow_dispatch:         # يسمح لك بتشغيله يدوياً من واجهة GitHub لتجربته فوراً

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # ضروري عشان يقدر يحفظ آخر منشور وسجل التشغيل بالمستودع

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python telegram_forwarder_fixed.py

      - name: Save last seen post id and log back to the repo
        if: always()   # يشتغل حتى لو خطوة "Run bot" فشلت، عشان السجل ما يضيع وقت الخطأ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_seen_id.txt bot_log.txt
          git diff --staged --quiet || git commit -m "تحديث آخر منشور وسجل التشغيل"
          git push

